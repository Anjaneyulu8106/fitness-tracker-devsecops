name: Enterprise DevSecOps Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:

# =========================================================
# SETUP STAGE
# =========================================================

  setup:
    name: Customer File Intake and Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Fitness Tracker Project
        run: |
          echo "======================================="
          echo "Fitness Tracker Project Detected"
          echo "======================================="

          ls -la

# =========================================================
# SECURITY SCANS
# =========================================================

  security_scans:
    name: Layer-wise Security Scanning
    runs-on: ubuntu-latest

    needs: setup

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Reports Folder
        run: mkdir -p reports

# =========================================================
# DETECT STACK
# =========================================================

      - name: Detect Application Stack
        run: |
          chmod +x scripts/detect-stack.sh
          bash scripts/detect-stack.sh

# =========================================================
# SETUP NODE
# =========================================================

      - name: Setup Node
        if: env.NODE == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18

# =========================================================
# INSTALL DEPENDENCIES
# =========================================================

      - name: Install Dependencies
        if: env.NODE == 'true'
        run: |
          npm install || true

# =========================================================
# GITLEAKS SCAN
# =========================================================

      - name: GitLeaks Secret Scan
        continue-on-error: true
        uses: zricethezav/gitleaks-action@master

# =========================================================
# NPM AUDIT
# =========================================================

      - name: Dependency Vulnerability Scan
        continue-on-error: true
        run: |
          npm audit --json > reports/npm-audit.json || true

# =========================================================
# SONARCLOUD
# =========================================================

      - name: SonarCloud Scan
        continue-on-error: true
        run: |
          echo "Running SonarCloud Scan"

# =========================================================
# BUILD DOCKER IMAGE
# =========================================================

      - name: Build Docker Image
        continue-on-error: true
        run: |
          docker build -t fitness-tracker:v1 .

# =========================================================
# INSTALL TRIVY
# =========================================================

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install trivy -y

# =========================================================
# TRIVY SCAN
# =========================================================

      - name: Trivy Scan
        continue-on-error: true
        run: |
          trivy image \
          --format json \
          --output reports/trivy.json \
          fitness-tracker:v1

# =========================================================
# SETUP PYTHON
# =========================================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

# =========================================================
# INSTALL CHECKOV
# =========================================================

      - name: Install Checkov
        run: pip install checkov

# =========================================================
# CHECKOV SCAN
# =========================================================

      - name: Checkov Scan
        continue-on-error: true
        run: |
          checkov -d . -o json > reports/checkov.json || true

# =========================================================
# INSTALL OPA
# =========================================================

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static

          chmod +x opa

          sudo mv opa /usr/local/bin/

# =========================================================
# OPA POLICY CHECK
# =========================================================

      - name: OPA Policy Check
        continue-on-error: true
        run: |
          opa eval \
          --data policies/security.rego \
          --input app-deployment.yaml \
          "data.security.deny"

# =========================================================
# DECISION ENGINE
# =========================================================

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run Decision Engine
        continue-on-error: true
        run: |
          chmod +x scripts/decision-engine.sh
          bash scripts/decision-engine.sh

# =========================================================
# UPLOAD RAW REPORTS
# =========================================================

      - name: Upload Raw Reports
        uses: actions/upload-artifact@v4
        with:
          name: raw-security-reports
          path: reports/

# =========================================================
# EXCEL REPORT
# =========================================================

  excel_report:
    name: Generate Excel Security Report
    runs-on: ubuntu-latest

    needs: security_scans

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          name: raw-security-reports
          path: reports/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Packages
        run: |
          pip install pandas openpyxl xlsxwriter

      - name: Generate Excel Report
        run: |
          python scripts/generate-report.py

      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: security-excel-report
          path: reports/security-report.xlsx

# =========================================================
# SEND EMAIL ALERT
# =========================================================

  send_email_alert:
    name: Send Email Alert If Policy Failed
    runs-on: ubuntu-latest

    needs: excel_report

    steps:

      - name: Send Mail
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: Enterprise DevSecOps Alert

          body: |
            Vulnerabilities detected in Fitness Tracker application.

            Please review security reports.

          to: ${{ secrets.MAIL_TO }}
          from: DevSecOps Pipeline

# =========================================================
# MANUAL APPROVAL
# =========================================================

  manual_approval:
    name: Manual Approval Before Deployment
    runs-on: ubuntu-latest

    needs: send_email_alert

    environment:
      name: vulnerability-review

    steps:

      - name: Approval Stage
        run: |
          echo "Waiting for reviewer approval"

# =========================================================
# EKS DEPLOYMENT
# =========================================================

  deploy_to_eks:
    name: Deploy to Amazon EKS
    runs-on: ubuntu-latest

    needs: manual_approval

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

# =========================================
# CONFIGURE AWS
# =========================================

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

# =========================================
# LOGIN TO DOCKERHUB
# =========================================

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

# =========================================
# BUILD AND PUSH IMAGE
# =========================================

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fitness-tracker:latest .

          docker push ${{ secrets.DOCKER_USERNAME }}/fitness-tracker:latest

# =========================================
# CONNECT TO EKS
# =========================================

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name ${{ secrets.EKS_CLUSTER_NAME }}

# =========================================
# DEPLOY APPLICATION
# =========================================

      - name: Deploy to EKS
        run: |
          kubectl apply -f app-deployment.yaml

# =========================================
# VERIFY DEPLOYMENT
# =========================================

      - name: Verify Deployment
        run: |
          kubectl get pods
          kubectl get services